name: Formal Verification

on:
  pull_request:
  push:
    branches: [main]

jobs:
  kani:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: model-checking/kani-verifier-action@v1

      - name: Run Kani proofs
        working-directory: contracts/stream
        run: cargo kani --tests
